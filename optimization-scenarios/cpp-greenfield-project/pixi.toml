[workspace]
authors = ["Jack Myers <jackhmyers97@gmail.com>"]
channels = ["conda-forge"]
name = "cpp-demo-project"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
configure = { cmd = "cmake $PIXI_PROJECT_ROOT --preset {{ preset }} && ln -sf build/{{ preset }}/compile_commands.json compile_commands.json", args = [
  { "arg" = "preset", "default" = "dev" },
] }
build = { cmd = "cmake --build build/{{ preset }} -t {{ target }}", args = [
  { "arg" = "preset", "default" = "dev" },
  { "arg" = "target", "default" = "all" },
], depends-on = [
  "configure",
] }
demo = { cmd = "./build/{{ preset }}/app/cpp-demo", args = [
  { "arg" = "preset", "default" = "dev" },
], depends-on = [
  "build",
] }


[tasks.format]
cmd = "nu scripts/format.nu"
description = "Format all C++ source files with clang-format"

[tasks.format-check]
cmd = "nu scripts/format-check.nu"
description = "Check formatting without modifying files (for CI)"

[dependencies]
cmake = ">=4.3.1,<5"
cxx-compiler = ">=1.11.0,<2"
ninja = ">=1.13.2,<2"
clang-format = ">=19.1.0,<20"
clang-tools = ">=19.1.0,<20"
llvm-tools = ">=18.1.0,<23"
nushell = ">=0.112.2,<0.113"
c-compiler = ">=1.11.0,<2"
gdb = ">=17.1,<18"
